<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="./assets/css/pages/Login/Login.css">
  <title>Login MEitrack</title>
  <script src="./assets/js/global/Preferencias.js" defer></script>
</head>

<body>

  <img id="img-escrito" src="duolingo/logo meizinho/meizinhoescrito.png" alt="Logo escrita" />

  <!--Parte do Login-->
  <div class="container-login">
    <div class="box-login">
      <img class="meizinho-joia" src="duolingo/logo meizinho/Meizinhodandojoia.png"
        alt="Meiznho dando um joia" />
      <div class="conteudo-box">
        <div class="box-input">
          <h1>Login</h1>

          <input id="email" type="email" placeholder="E-mail" maxlength="70" />
          <p id="aviso"></p>

          <input id="senha" type="text" placeholder="Senha" />
          <p id="avisosenha"></p>

          <button class="entrar" onclick="fazerLogin(event)">
            <h2>Entrar</h2>
          </button>
        </div>
      </div>
      <div class="links">
        <a href="Recsenha.html" id="link">
          <p>Esqueci a senha</p>
        </a>
        <a href="cadastro.html" id="link">
          <p>Cadastrar-se</p>
        </a>
      </div>
    </div>
  </div>

  <script src="./assets/js/API/Rest.js"></script>
  <script src="./assets/js/pages/Login/login.js" type="module"></script>


  <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
      <div class="vw-plugin-top-wrapper"></div>
    </div>
  </div>
  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  <script>
    new window.VLibras.Widget('https://vlibras.gov.br/app');
  </script>
</body>

</html>
