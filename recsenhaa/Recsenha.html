<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./recsenha.css">
    <title>Recuperar Senha</title>
</head>
<body>

    <div class="container-pai">
        <div class="box-recsenha">
            <h1>Recuperar Senha</h1>
            <p class="subtitle">Digite seu e-mail cadastrado para receber uma nova senha de acesso.</p>
            
            <form id="loginForm">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required placeholder="exemplo@email.com">

                <button type="submit">Enviar Nova Senha</button> 
            </form>
            
            <div id="result"></div>
        </div>
    </div>
    
    <script src="./Recsenhafront.js"></script>
</body>
</html>
