<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/pages/Recsenha/recsenha.css">
    <title>Recuperar Senha · MEI Track</title>
    <script src="./assets/js/global/Preferencias.js" defer></script>
</head>
<body>

    <img id="img-escrito" src="duolingo/logo meizinho/meizinhoescrito.png" alt="Logo MEI Track" />

    <div class="container-pai">
        <div class="box-recsenha">
            <img class="meizinho-joia" src="duolingo/logo meizinho/Meizinhodandojoia.png" alt="Meizinho dando um joia" />
            <div class="conteudo-box">
                <div class="box-input">
                    <h1>Recuperar Senha</h1>

                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" required placeholder="Digite seu e-mail" autocomplete="email">

                    <label for="nova-senha">Nova Senha:</label>
                    <input type="password" id="nova-senha" name="nova_senha" placeholder="Nova senha (mín. 8 caracteres)" autocomplete="new-password">

                    <label for="confirma-senha">Confirmar Senha:</label>
                    <input type="password" id="confirma-senha" name="confirma_senha" placeholder="Confirmar nova senha" autocomplete="new-password">

                    <button type="submit" id="btn-enviar">Enviar</button>

                    <div id="result"></div>

                    <a class="voltar-login" href="Login.html">← Voltar para o login</a>
                </div>
            </div>
        </div>
    </div>

    <script src="./assets/js/pages/Recsenha/Partials/recsenha.js"></script>
    <script>
      // Validação client-side da página de recuperação de senha
      document.getElementById('btn-enviar').addEventListener('click', function(e) {
        e.preventDefault();
        const result       = document.getElementById('result');
        const email        = document.getElementById('email').value.trim();
        const novaSenha    = document.getElementById('nova-senha').value;
        const confirma     = document.getElementById('confirma-senha').value;

        result.style.color = '#FFE9D6';

        // Validar e-mail
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          result.style.color = '#ffb3b3';
          result.textContent = '⚠️ Digite um e-mail válido.';
          return;
        }

        // Validar campos de senha preenchidos
        if (!novaSenha) {
          result.style.color = '#ffb3b3';
          result.textContent = '⚠️ O campo senha é obrigatório.';
          document.getElementById('nova-senha').focus();
          return;
        }

        // Comprimento mínimo
        if (novaSenha.length < 8) {
          result.style.color = '#ffb3b3';
          result.textContent = '⚠️ A senha deve ter no mínimo 8 caracteres.';
          document.getElementById('nova-senha').focus();
          return;
        }

        // Confirmação
        if (novaSenha !== confirma) {
          result.style.color = '#ffb3b3';
          result.textContent = '⚠️ As senhas não coincidem.';
          document.getElementById('confirma-senha').focus();
          return;
        }

        // Tudo válido — prossegue com o envio real (lógica do recsenha.js)
        result.style.color = '#b3ffb3';
        result.textContent = '✅ Validação OK. Enviando solicitação...';
        // Disparar submit real via backend, se disponível
        if (typeof enviarRecuperacao === 'function') {
          enviarRecuperacao(email, novaSenha);
        }
      });
    </script>
</body>
</html>
