<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cadastro.css">
    <title>Cadstro Mei track</title>
</head>
<body>

    <div class="box-pai">
      <img class="meizinho-img" src="/Site/img/logo meizinho/meizinho/meizinho dormindo.png" alt="Logo meizinho">  
      <h1>Cadastre-se</h1>
          <!--Inputs de cadastro-->

          <input type="text" placeholder="Nome">
          <input id="email" type="email" placeholder="e-mail">
          <input type="text" placeholder="Senha">
          <input type="text" placeholder="Confirmar senha">
          
          <!--Botão de entrada-->
          <button class="cadastrar-se" onclick="validar(), validarsenha(), validaremail()">
            <a href="#"><h2>Cadastrar-se</h2></a>
          </button>
          <br>
          <p class="voltar"><a href="#"></a>Voltar</p>

    </div>

    <!--Parte do Vlibras-->
    <script src="cadastro.js"></script>
    <script src="/Site/Login/Login.js"></script>

    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
          <div class="vw-plugin-top-wrapper"></div>
        </div>
      </div>
      <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
      <script>
        new window.VLibras.Widget('https://vlibras.gov.br/app');
      </script>
</body>
</html>
