<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="./assets/css/pages/Cadastro/Cadastro.css">
    <title>Cadstro Mei track</title>
    <script src="./assets/js/global/Preferencias.js" defer></script>
</head>
<body>

    <div class="box-pai">
      <img class="meizinho-img" src="duolingo/logo meizinho/Meizinhosolo.png" alt="Logo meizinho">  
      <h1>Cadastre-se</h1>
          <!--Inputs de cadastro-->

          <input id="nome" name="user" type="text" placeholder="Nome de Usuário">
          <input id="email" name="email" type="email" placeholder="email">
          <p id="aviso" style="color: white; font-size: 13px;"></p>

          <input id="senha" name="senha" type="password" placeholder="Senha">

          <input id="confirma-senha" name="conf_senha" type="password" placeholder="Confirmar senha">
          
          <!--Botão de entrada-->
          <button class="cadastrar-se" onclick="fazerCadastro(event)">
            <h2>Cadastrar-se</h2>
          </button>
          <br>

          <a class="voltar" href="Login.html">Voltar</a>
    </div>

    <script src="./assets/js/API/Rest.js"></script>
    <script src="./assets/js/pages/Cadastro/cadastro.js"></script>

    <!--Parte do Vlibras-->
    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
          <div class="vw-plugin-top-wrapper"></div>
        </div>
      </div>
      <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
      <script>
        new window.VLibras.Widget('https://vlibras.gov.br/app');
      </script>
</body>
</html>
